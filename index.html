<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Sugar Tracker - Reports</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">GlucoTrack</h1>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Reports</a></li>
                <li><a href="add-reading.html">Add Reading</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>Blood Sugar Reports</h2>
            <p>Analyze your readings over time.</p>
        </header>

        <section class="card filter-section">
            <h3>Filter Readings</h3>
            <form id="filterForm" class="filter-grid">
                <div class="form-group">
                    <label for="filterMonth">By Month:</label>
                    <input type="month" id="filterMonth">
                </div>
                <div class="form-group">
                    <label for="filterStartDate">Start Date:</label>
                    <input type="date" id="filterStartDate">
                </div>
                <div class="form-group">
                    <label for="filterEndDate">End Date:</label>
                    <input type="date" id="filterEndDate">
                </div>
                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Apply Filters</button>
                    <button type="button" id="clearFilters" class="btn btn-secondary">Clear</button>
                </div>
            </form>
        </section>

        <section class="summary-grid">
            <div class="summary-card">
                <h4>Average (mg/dL)</h4>
                <div class="stat-value" id="avgMgdl">--</div>
            </div>
            <div class="summary-card">
                <h4>Average (mmol/L)</h4>
                <div class="stat-value" id="avgMmol">--</div>
            </div>
            <div class="summary-card">
                <h4>Maximum (mg/dL)</h4>
                <div class="stat-value" id="maxMgdl">--</div>
            </div>
            <div class="summary-card">
                <h4>Minimum (mg/dL)</h4>
                <div class="stat-value" id="minMgdl">--</div>
            </div>
        </section>

        <section class="card chart-section">
            <canvas id="bloodSugarChart"></canvas>
        </section>

        <section class="card table-section">
            <h3>Reading History</h3>
            <div class="table-responsive">
                <table id="reportsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Reading (mg/dL)</th>
                            <th>mmol/L</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
